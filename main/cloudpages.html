      body {

        margin: 0;

      header {
        padding: 20px;

      }

      h1 {

        font-size: 36px;
        font-weight: normal;

      h2 {

      /* ── Portfolio sections ── */
      .portfolio {
        max-width: 860px;

      /* ── Code block ── */
      pre {
        background: #f5f5f5;
        border: 1px solid #e0e0e0;
        border-radius: 4px;
        padding: 16px;
        overflow-x: auto;
        margin: 0 0 20px;
      }

      code {
        font-family: "Courier New", Courier, monospace;
        font-size: 13px;
        line-height: 1.6;
        white-space: pre;
      }

      /* ── Screenshots ── */
      .screenshots {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .screenshots img {
        max-width: 100%;
        height: auto;
        border: 1px solid #e0e0e0;
        border-radius: 4px;
        flex: 1 1 300px;
      }
